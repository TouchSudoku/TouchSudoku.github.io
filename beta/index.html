<body>
  <div id="app"></div>
  <script>
    // Safari PWA ignores user-scalable=no — block pinch explicitly
    document.addEventListener('touchmove', function (e) {
      if (e.touches.length > 1) e.preventDefault()
    }, { passive: false })
    document.addEventListener('gesturestart', function (e) {
      e.preventDefault()
    }, { passive: false })
  </script>
