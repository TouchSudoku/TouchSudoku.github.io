<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Touch Sudoku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sudoku" />
  <link rel="apple-touch-icon" href="./icons/192.png" />
  <script type="module" crossorigin src="./assets/index-Mt5YXLnw.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-CE2gKY7d.css">
<link rel="manifest" href="./manifest.webmanifest"></head>
<body>
  <div id="app"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:10px;font-size:12px;z-index:9999;word-break:break-all;';
      d.textContent = (err && err.stack) ? err.stack : (msg + ' ' + src + ':' + line);
      document.body.appendChild(d);
    };
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:orange;color:black;padding:10px;font-size:12px;z-index:9999;word-break:break-all;';
      d.textContent = 'Unhandled: ' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
      document.body.appendChild(d);
    });
  </script>
  <script>
    // Safari PWA ignores user-scalable=no — block pinch explicitly
    document.addEventListener('touchmove', function (e) {
      if (e.touches.length > 1) e.preventDefault()
    }, { passive: false })
    document.addEventListener('gesturestart', function (e) {
      e.preventDefault()
    }, { passive: false })
  </script>
</body>
</html>
