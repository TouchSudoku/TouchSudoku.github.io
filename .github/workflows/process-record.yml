name: Process Record

on:
  workflow_call:

permissions:
  contents: write
  issues: write

jobs:
  process-record:
    runs-on: ubuntu-latest
    steps:
      - name: Check if issue has record-submission label
        id: check-label
        run: |
          LABELS='${{ toJson(github.event.issue.labels) }}'
          if echo "$LABELS" | grep -q '"record-submission"'; then
            echo "has_label=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_label=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Exit if not record submission
        if: steps.check-label.outputs.has_label == 'false'
        run: |
          echo "Issue does not have record-submission label. Skipping."
          exit 0

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: records

      - name: Fetch lib from master
        run: git checkout origin/master -- lib/sudoku-core.cjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Extract record from issue body
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Save the issue body to a file to safely extract content
          printf '%s' "$ISSUE_BODY" > issue_body.txt

          # Try to extract from code block
          RECORD=$(sed -n '/^```/,/^```/p' issue_body.txt | sed '1d;$d')

          if [ -z "$RECORD" ]; then
            echo "No record found in code block"
            cat issue_body.txt >&2
            exit 1
          fi

          DELIM=$(openssl rand -hex 16)
          echo "record<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$RECORD" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: Validate and auto-correct record
        id: validate
        env:
          RECORD_BODY: ${{ steps.extract.outputs.record }}
        run: |
          # Write record to a temp file, extracting puzzle string as filename
          printf '%s' "$RECORD_BODY" > record_body.txt

          # Get puzzle string (second line) and use as filename (no extension)
          PUZZLE_STRING=$(sed -n '2p' record_body.txt)
          mv record_body.txt "$PUZZLE_STRING"

          # Disable exit-on-error temporarily to capture exit code 2 (auto-corrected)
          set +e
          npx ts-node --skipProject -O '{"module":"CommonJS"}' scripts/check-record.ts "$PUZZLE_STRING" > output.json 2> errors.txt
          EXIT_CODE=$?
          set -e

          cat errors.txt >&2
          RESULT=$(cat output.json)

          DELIM=$(openssl rand -hex 16)
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "puzzle_string=$PUZZLE_STRING" >> "$GITHUB_OUTPUT"
          echo "result<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

          # Exit codes: 0=valid, 2=auto-corrected (both OK), 1=invalid
          if [ "$EXIT_CODE" -eq 1 ]; then
            exit 1
          fi
          exit 0
        continue-on-error: true

      - name: Handle validation result
        id: handle-result
        env:
          VALIDATE_RESULT: ${{ steps.validate.outputs.result }}
          VALIDATE_EXIT_CODE: ${{ steps.validate.outputs.exit_code }}
          VALIDATE_PUZZLE: ${{ steps.validate.outputs.puzzle_string }}
        run: |
          EXIT_CODE=$VALIDATE_EXIT_CODE

          # Write result to file to safely handle JSON with special characters
          printf '%s' "$VALIDATE_RESULT" > result.json

          DELIM=$(openssl rand -hex 16)

          if [ "$EXIT_CODE" = "0" ]; then
            echo "status=valid" >> "$GITHUB_OUTPUT"
            # For exit 0, read the original (already validated) file from disk
            echo "record<<${DELIM}" >> "$GITHUB_OUTPUT"
            cat "$VALIDATE_PUZZLE" >> "$GITHUB_OUTPUT"
            echo "${DELIM}" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" = "2" ]; then
            echo "status=corrected" >> "$GITHUB_OUTPUT"
            echo "record<<${DELIM}" >> "$GITHUB_OUTPUT"
            jq -r '.fixedBlocks["0"]' result.json >> "$GITHUB_OUTPUT"
            echo "${DELIM}" >> "$GITHUB_OUTPUT"
          else
            echo "status=invalid" >> "$GITHUB_OUTPUT"
            echo "error<<${DELIM}" >> "$GITHUB_OUTPUT"
            jq -r '.error // "Validation failed"' result.json >> "$GITHUB_OUTPUT" 2>/dev/null || echo "Validation failed" >> "$GITHUB_OUTPUT"
            echo "${DELIM}" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit record if valid
        if: steps.handle-result.outputs.status != 'invalid'
        env:
          VALIDATED_RECORD: ${{ steps.handle-result.outputs.record }}
        run: |
          # Extract puzzle string (second line of the new record)
          PUZZLE_STRING=$(printf '%s' "$VALIDATED_RECORD" | sed -n '2p')
          RECORD_FILE="records/$PUZZLE_STRING"

          printf '%s' "$VALIDATED_RECORD" > new_record

          # Merge new block into record file (script writes the file on success)
          set +e
          npx ts-node --skipProject -O '{"module":"CommonJS"}' scripts/compare-records.ts "$RECORD_FILE" new_record 2>&1
          COMPARE_EXIT_CODE=$?
          set -e
          rm -f new_record

          if [ $COMPARE_EXIT_CODE -eq 0 ]; then
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add "$RECORD_FILE"
            git commit -m "$PUZZLE_STRING"
            git push origin records
          else
            echo "New record is not better. Skipping commit."
          fi

      - name: Comment on issue
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ steps.handle-result.outputs.status }}';
            const error = '${{ steps.handle-result.outputs.error }}';

            let comment = '';
            if (status === 'valid') {
              comment = '✅ Record validated and committed successfully!';
            } else if (status === 'corrected') {
              comment = '✅ Record had time mismatch (auto-corrected) and committed!';
            } else if (status === 'invalid') {
              comment = `❌ Record validation failed:\n\`\`\`\n${error}\n\`\`\``;
            } else {
              comment = '⚠️ Issue label check failed - skipping processing';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

            if (status === 'invalid') {
              github.rest.issues.update({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed',
                state_reason: 'not_planned'
              });
            } else if (status === 'valid' || status === 'corrected') {
              github.rest.issues.update({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed',
                state_reason: 'completed'
              });
            }
