name: Check Record PR

on:
  pull_request:
    branches: [records]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  verify-and-merge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # Always check out the BASE branch — trusted source of the script.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          git fetch origin "$HEAD"
          FILES=$(git diff --name-only "$BASE" "$HEAD")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check exactly one record file changed
        id: single-record
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          RECORD_FILES=$(echo "$FILES" | grep '^records/' || true)
          OTHER_FILES=$(echo "$FILES" | grep -v '^records/' || true)
          COUNT=$(echo "$RECORD_FILES" | grep -c . || true)

          if [ -n "$OTHER_FILES" ]; then
            echo "::error::PR contains changes outside records/: $OTHER_FILES"
            exit 1
          fi
          if [ "$COUNT" -ne 1 ]; then
            echo "::error::PR must change exactly 1 record file, found $COUNT"
            exit 1
          fi

          RECORD_FILE=$(echo "$RECORD_FILES" | head -1)
          BASENAME=$(basename "$RECORD_FILE")
          echo "record_file=$RECORD_FILE" >> $GITHUB_OUTPUT
          echo "basename=$BASENAME" >> $GITHUB_OUTPUT

      - name: Check filename is valid completed puzzle string
        run: |
          BASENAME="${{ steps.single-record.outputs.basename }}"
          if ! echo "$BASENAME" | grep -qE '^[0-9a-i]{81}$'; then
            echo "::error::Filename '$BASENAME' is not 81 chars of [0-9a-i]"
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2

      - name: Extract and verify new record block from PR
        id: verify
        run: |
          RECORD_FILE="${{ steps.single-record.outputs.record_file }}"
          HEAD=${{ github.event.pull_request.head.sha }}

          # Get the PR's version of the file
          git show "$HEAD:$RECORD_FILE" > /tmp/pr-record 2>/dev/null || true

          # Get the current base version (may not exist yet)
          git show "HEAD:$RECORD_FILE" > /tmp/base-record 2>/dev/null || true

          # Extract the new block: lines in PR file not present in base file.
          # The new block is the first block in the PR file whose first line
          # is absent from the base file.
          NEW_BLOCK=$(bun -e "
            const fs = require('fs')
            const pr   = fs.existsSync('/tmp/pr-record')   ? fs.readFileSync('/tmp/pr-record',   'utf8') : ''
            const base = fs.existsSync('/tmp/base-record') ? fs.readFileSync('/tmp/base-record', 'utf8') : ''
            const prBlocks   = pr.trimEnd().split('\n===\n').map(b => b.trim()).filter(Boolean)
            const baseBlocks = new Set(base.trimEnd().split('\n===\n').map(b => b.trim()).filter(Boolean))
            const newBlock = prBlocks.find(b => !baseBlocks.has(b))
            if (!newBlock) { console.error('No new block found in PR'); process.exit(1) }
            process.stdout.write(newBlock)
          ")

          echo "$NEW_BLOCK" > /tmp/new-block
          echo "New block:"
          cat /tmp/new-block

          # Verify the new block in isolation using check-record
          # File name = initial puzzle (line 2 of block)
          INITIAL_PUZZLE=$(sed -n '2p' /tmp/new-block)
          echo "$NEW_BLOCK" > "/tmp/$INITIAL_PUZZLE"
          printf '\n' >> "/tmp/$INITIAL_PUZZLE"
          bun run scripts/check-record.ts "/tmp/$INITIAL_PUZZLE" > /tmp/check-result.json || EXIT_CODE=$?

          # Handle exit codes:
          # 0 = OK, 2 = fixable errors (time mismatch), 1 = critical errors
          EXIT_CODE=${EXIT_CODE:-0}
          cat /tmp/check-result.json

          if [ $EXIT_CODE -eq 1 ]; then
            echo "::error::Critical verification errors found"
            exit 1
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "::warning::Fixable errors found (will auto-correct)"
            echo "check_result=$(cat /tmp/check-result.json)" >> $GITHUB_OUTPUT
          fi

      - name: Write merged record to PR branch and merge PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const base     = fs.existsSync('/tmp/base-record') ? fs.readFileSync('/tmp/base-record', 'utf8') : ''
            let newBlock = fs.readFileSync('/tmp/new-block',  'utf8').trim()

            // Apply time corrections if they exist
            const checkResultStr = `${{ steps.verify.outputs.check_result }}`
            if (checkResultStr && checkResultStr.startsWith('{')) {
              try {
                const checkResult = JSON.parse(checkResultStr)
                if (checkResult.fixedBlocks && checkResult.fixedBlocks[0]) {
                  newBlock = checkResult.fixedBlocks[0]
                  console.log('Applied time correction to new block')
                }
              } catch (e) {
                console.warn('Could not parse check result:', e.message)
              }
            }

            const blocks = [
              ...base.trimEnd().split('\n===\n').map(b => b.trim()).filter(Boolean),
              newBlock,
            ]

            // Deduplicate by login, keep lowest T
            const byLogin = new Map()
            for (const b of blocks) {
              const firstLine = b.split('\n')[0]
              const m = firstLine.match(/,\s*(\d+)\s+touches/)
              const t = m ? parseInt(m[1]) : Infinity
              const login = (firstLine.match(/\bby\s+(\S+)$/) || [])[1] || firstLine
              if (!byLogin.has(login) || t < byLogin.get(login).t) byLogin.set(login, { b, t })
            }

            const merged = [...byLogin.values()]
              .sort((a, b) => a.t - b.t)
              .slice(0, 3)
              .map(x => x.b)
              .join('\n===\n') + '\n'

            const recordFile = '${{ steps.single-record.outputs.record_file }}'
            const prHeadRef  = context.payload.pull_request.head.ref

            // Parse block for commit message
            const lines = newBlock.split('\n')
            const headerLine = lines[0]
            const initialPuzzle = lines[1]
            const moveLines = lines.slice(2, lines.length - 1) // exclude header, initial, and final puzzle

            // Reconstruct puzzle state after each move and extract > 5T moves
            const MOVE_RE = /^(\d+): ([a-z0-9]+=[a-z0-9\-@,]+) # (\d+)T/
            let puzzle = initialPuzzle
            const highlightMoves = []

            for (const line of moveLines) {
              const m = line.match(MOVE_RE)
              if (!m) continue

              const moveNum = m[1]
              const annot = m[2]
              const touches = parseInt(m[3])

              // Parse annotation key (left of "=") - format: {box}{cell}{digit}
              const key = annot.split('=')[0]
              if (key.length >= 3) {
                const bc = key.substring(0, 2)
                const digit = parseInt(key[2])

                // Convert bc (box-cell) to grid index
                const box = parseInt(bc[0]) - 1     // 0-8
                const cell = parseInt(bc[1]) - 1    // 0-8
                const i = Math.floor(box / 3) * 3 + Math.floor(cell / 3)
                const j = (box % 3) * 3 + (cell % 3)
                const idx = i * 9 + j

                // Update puzzle string: digit 1-9 -> a-i
                const oldPuzzle = puzzle
                puzzle = puzzle.slice(0, idx) + String.fromCharCode(96 + digit) + puzzle.slice(idx + 1)

                // Include if > 5 touches
                if (touches > 5) {
                  highlightMoves.push(`${moveNum}: ${oldPuzzle}&${annot}`)
                }
              }
            }

            // Commit title = initial puzzle
            const summary = initialPuzzle

            // Commit message = header line + highlight moves
            const commitMessage = [headerLine, ...highlightMoves].join('\n')

            // Get current file SHA on the PR branch (needed for update)
            let fileSha
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: recordFile, ref: prHeadRef,
              })
              fileSha = data.sha
            } catch {}

            // Write merged content to PR branch
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo,
              path: recordFile, message: summary, branch: prHeadRef,
              content: Buffer.from(merged).toString('base64'),
              ...(fileSha ? { sha: fileSha } : {}),
            })

            // Wait briefly for GitHub to settle before merging
            await new Promise(r => setTimeout(r, 2000))

            // Merge the PR — shows as "Merged" (purple), not "Closed" (red)
            await github.rest.pulls.merge({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash',
              commit_title: summary,
              commit_message: commitMessage,
            })

            // Delete the PR branch
            await github.rest.git.deleteRef({
              owner: context.repo.owner, repo: context.repo.repo,
              ref: `heads/${prHeadRef}`,
            })

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ Record verification failed — see [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
            })
